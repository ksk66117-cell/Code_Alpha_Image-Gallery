<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="garelly.css">
</head>

<body>

<h1 class="title">Image Gallery</h1>

<div class="gallery">
    <img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(0)">
    <img src="https://picsum.photos/id/1016/400/300" onclick="openLightbox(1)">
    <img src="https://picsum.photos/id/1018/400/300" onclick="openLightbox(2)">
    <img src="https://picsum.photos/id/1020/400/300" onclick="openLightbox(3)">
    <img src="https://picsum.photos/id/1024/400/300" onclick="openLightbox(4)">
    <img src="https://picsum.photos/id/1025/400/300" onclick="openLightbox(5)">
</div>

<!-- Lightbox -->
<div id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <button class="prev" onclick="changeImage(-1)">❮</button>
    <img id="lightbox-img">
    <button class="next" onclick="changeImage(1)">❯</button>
</div>

<script src="garelly.js"></script>

</body>
</html>
